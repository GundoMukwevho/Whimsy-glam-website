<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - WhimsyGlam</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/contact.css">
</head>

<body>

<header class="navbar">
    <div class="logo">WhimsyGlam</div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<section class="contact-container">

    <!-- LEFT SIDE -->
    <div class="contact-info">
        <h2>Get In Touch</h2>
        <p>We’re here to make your nails flawless 💅</p>

        <p><strong>Phone:</strong> +27 68 698 5166</p>
        <p><strong>Location:</strong> Johannesburg</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="contact-form">
        <h2>Book Appointment</h2>

        <input type="text" id="name" placeholder="Full Name">
        <select id="service">
            <option>Plain Set</option>
            <option>Design Set</option>
        </select>

        <input type="date" id="date">
        <input type="time" id="time">

        <button onclick="book()">Send via WhatsApp</button>
    </div>

</section>

<script src="js/script.js"></script>

</body>
</html>
